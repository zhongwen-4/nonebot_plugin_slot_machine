name: Publish

on:
  push:
    tags:
      - "*"

permissions:
  actions: read
  contents: write

jobs:
  publish:
    name: Publish and Release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          current_tag = os.environ["GITHUB_REF_NAME"]
          current_run_id = int(os.environ["GITHUB_RUN_ID"])


          def git(*args: str) -> str:
              return subprocess.check_output(
                  ["git", *args],
                  encoding="utf-8",
              ).strip()


          tags = git("tag", "--sort=-creatordate").splitlines()
          base_tag = next((tag for tag in tags if tag != current_tag), "")

          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/workflows/"
              "publish.yml/runs?per_page=50&event=push",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              workflow_runs = json.load(response)["workflow_runs"]

          completed_runs = [
              run
              for run in workflow_runs
              if run["id"] != current_run_id and run["status"] == "completed"
          ]
          previous_run = completed_runs[0] if completed_runs else None

          if previous_run and previous_run["conclusion"] != "success":
              successful_run = next(
                  (
                      run
                      for run in completed_runs[1:]
                      if run["conclusion"] == "success"
                  ),
                  None,
              )
              if successful_run:
                  success_tag = successful_run["head_branch"]
                  if success_tag in tags and success_tag != current_tag:
                      base_tag = success_tag
                  else:
                      success_tags = git(
                          "tag",
                          "--points-at",
                          successful_run["head_sha"],
                      ).splitlines()
                      base_tag = next(
                          (
                              tag
                              for tag in tags
                              if tag in success_tags and tag != current_tag
                          ),
                          base_tag,
                      )

          commit_range = f"{base_tag}..{current_tag}" if base_tag else current_tag
          commits = git(
              "log",
              "--no-merges",
              "--pretty=format:%s",
              commit_range,
          ).splitlines()

          with open("RELEASE_BODY.md", "w", encoding="utf-8") as file:
              file.write("更新日志：\n")
              if commits:
                  for index, commit in enumerate(commits, start=1):
                      file.write(f"{index}. {commit}\n")
              else:
                  file.write("1. 无\n")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_BODY.md
